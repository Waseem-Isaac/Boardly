<h2 mat-dialog-title>Add Team Member</h2>

<mat-dialog-content>
  @if (errorMessage()) {
  <div class="error-banner" role="alert">{{ errorMessage() }}</div>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="user-form">

    <div class="field">
      <label for="" class="label">Full Name</label>
      <mat-form-field appearance="outline" class="full-width">
        <input matInput formControlName="name" placeholder="e.g. Jane Doe" />
        <!-- @if (getFieldError('name')) { -->
        <mat-error>{{ getFieldError('name') }}</mat-error>
        <!-- } -->
      </mat-form-field>
    </div>

    <div class="field">
      <label for="" class="label">Email</label>
      <mat-form-field appearance="outline" class="full-width">
        <input matInput formControlName="email" type="email" placeholder="e.g. jane@example.com" />
        <!-- @if (getFieldError('email')) { -->
        <mat-error>{{ getFieldError('email') }}</mat-error>
        <!-- } -->
      </mat-form-field>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="form-actions">
  <button mat-button type="button" (click)="onCancel()">Cancel</button>
  <button mat-button class="btn-primary" type="submit" [disabled]="isSubmitting() || form.invalid" (click)="onSubmit()">
    {{ isSubmitting() ? 'Adding...' : 'Add Member' }}
  </button>
</mat-dialog-actions>
